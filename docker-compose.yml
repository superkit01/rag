version: "3.9"

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db:/docker-entrypoint-initdb.d

  redis:
    image: docker.m.daocloud.io/library/redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: docker.m.daocloud.io/opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  temporal:
    image: docker.m.daocloud.io/temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: rag
      POSTGRES_PWD: rag
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: temporal
    ports:
      - "7233:7233"
    depends_on:
      - postgres

  temporal-ui:
    image: docker.m.daocloud.io/temporalio/ui:2.30.3
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
